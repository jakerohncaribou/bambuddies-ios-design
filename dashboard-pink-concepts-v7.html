<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pink Concepts v7 — Mauve & Hot Pink Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:#1a1a1a;min-height:100vh;padding:30px 20px;color:#fff;}
.hdr{text-align:center;margin-bottom:30px;}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.hdr p{color:#999;font-size:13px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(393px,420px));gap:40px;justify-content:center;}
.wrap{display:flex;flex-direction:column;align-items:center;}
.label{font-size:12px;color:#bbb;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.swatch{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:4px;}
.tagline{font-size:11px;color:#888;margin-bottom:14px;max-width:360px;text-align:center;min-height:14px;}

.phone{width:393px;height:852px;border-radius:52px;border:3px solid #222;background:#000;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:36px;background:#000;border-radius:0 0 20px 20px;z-index:100;}
.inner{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;background:#fff;}
.sbar{position:absolute;top:0;left:0;right:0;height:54px;padding:14px 28px 0;display:flex;justify-content:space-between;align-items:center;z-index:50;font-size:15px;font-weight:600;color:#1a1a1a;}
.scr{position:absolute;top:54px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px;}
.scr::-webkit-scrollbar{display:none;}

/* Each iteration scoped to .phone[data-v="N"] — CSS variables drive theming */
.phone{--primary:#7c3aed;--primary-dark:#6d28d9;--primary-light:#a78bfa;--primary-bg-1:#ede9fe;--primary-bg-2:#ddd6fe;--primary-bg-3:#e9d5ff;--primary-tint:#f5f3ff;--primary-border:#ede9fe;}
.phone[data-c="pink"]{--primary:#c73078;--primary-dark:#a61e5f;--primary-light:#e879b0;--primary-bg-1:#fce7f3;--primary-bg-2:#fbcfe8;--primary-bg-3:#f9a8d4;--primary-tint:#fdf2f8;--primary-border:#fbcfe8;}

/* ===== TOP BAR ===== */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 18px 6px;}
.topbar-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Outfit';font-weight:700;font-size:18px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.phone .topbar-avatar{background:linear-gradient(135deg,var(--primary-light),var(--primary-dark));}
.topbar-name-wrap{flex:1;min-width:0;display:flex;align-items:flex-end;line-height:1;}
.topbar-name{font-family:'Caveat',cursive;font-size:36px;font-weight:700;line-height:.9;}
.phone .topbar-name{color:var(--primary);}
.topbar-icons{display:flex;gap:8px;}
.topbar-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;border:1px solid;}
.phone .topbar-icon{background:var(--primary-tint);border-color:var(--primary-border);}
.topbar-icon svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.phone .topbar-icon svg{stroke:var(--primary-dark);}
.topbar-icon .dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:#c73078;border:2px solid #fff;}

/* ===== GREETING ===== */
.greet{padding:4px 20px 14px;font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:#1a1a1a;letter-spacing:-.4px;line-height:1.2;}

/* ===== ACTION ROW ===== */
.actions-bg{margin:0 16px 14px;border-radius:22px;padding:14px 10px;}
.phone .actions-bg{background:linear-gradient(135deg,var(--primary-bg-1),var(--primary-bg-2) 50%,var(--primary-bg-3));}
.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.act{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.act-bubble{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.10),inset 0 0 0 2px #1a1a1a;position:relative;transition:transform .15s;}
.act-bubble:active{transform:scale(.95);}
.act-badge{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 5px;border-radius:99px;background:#c73078;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}
.act-lbl{font-size:11px;font-weight:700;color:#1a1a1a;text-align:center;line-height:1.1;}

/* ===== AD BANNER ===== */
.ad{margin:0 16px 18px;background:linear-gradient(135deg,#fef3e7,#fee5ca);border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid #fcd9a8;}
.ad-img{width:44px;height:44px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ad-txt{flex:1;min-width:0;}
.ad-label{font-size:9px;font-weight:700;color:#9a6f2a;letter-spacing:.8px;text-transform:uppercase;margin-bottom:1px;}
.ad-head{font-size:13px;font-weight:700;color:#1a1a1a;}
.ad-sub{font-size:11px;color:#6d4f16;margin-top:1px;}

/* ===== SECTIONS ===== */
.sec-wrap{padding:0 18px;margin-bottom:20px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-family:'Caveat',cursive;font-size:26px;font-weight:700;color:#1a1a1a;line-height:1;display:flex;align-items:center;gap:8px;}
.sec-count{background:#fecaca;color:#b91c1c;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;font-family:'Outfit';}
.sec-link{font-size:12px;font-weight:600;}
.phone .sec-link{color:var(--primary);}

/* Status pills (locked colors) */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.pill-committed{background:#dcfce7;color:#166534;}
.pill-pending{background:#fef3c7;color:#92400e;}
.pill-next{background:var(--primary-bg-1);color:var(--primary-dark);}

/* Card */
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:0 2px 10px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);}
.phone .card.next{background:linear-gradient(135deg,var(--primary-tint),#fff);}

.game-row{display:flex;gap:12px;align-items:center;}
.date-blk{width:48px;height:48px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.phone .date-blk{background:var(--primary-tint);color:var(--primary-dark);}
.date-blk .mon{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.date-blk .day{font-size:18px;font-weight:900;line-height:.9;margin-top:2px;}
.game-time{font-family:'Outfit';font-size:15px;font-weight:800;color:#1a1a1a;letter-spacing:-.3px;line-height:1.1;}
.game-name{font-size:13px;font-weight:600;color:#555;margin-top:2px;}
.game-loc{font-size:11px;color:#999;margin-top:3px;display:flex;align-items:center;gap:4px;}
.game-loc svg{width:10px;height:10px;stroke:#999;fill:none;stroke-width:2;}
.game-mid{flex:1;min-width:0;}
.game-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.game-players{font-size:11px;font-weight:700;color:#1a1a1a;}

/* Needs Attention — LEFT-aligned stacked CTAs */
.att-row{display:flex;gap:10px;align-items:center;}
.att-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;font-family:'Outfit';flex-shrink:0;}
.att-avatar.mia{background:linear-gradient(135deg,#fcd34d,#f59e0b);}
.att-avatar.lisa{background:linear-gradient(135deg,#60a5fa,#3b82f6);}
.att-txt{flex:1;min-width:0;}
.att-name{font-size:13px;font-weight:700;color:#1a1a1a;}
.att-meta{font-size:11px;color:#999;margin-top:1px;}
.att-cta{display:flex;flex-direction:column;align-items:stretch;gap:4px;flex-shrink:0;min-width:80px;}
.att-accept{color:#fff;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;text-align:left;cursor:pointer;}
.phone .att-accept{background:var(--primary);}
.att-decline{font-size:11px;color:#999;font-weight:600;text-align:left;cursor:pointer;text-decoration:underline;padding:2px 4px;}

/* ===== TAB BAR ===== */
.tbar{position:absolute;bottom:0;left:0;right:0;height:83px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:1px solid #eee;display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;z-index:60;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.3px;padding-bottom:34px;cursor:pointer;}
.tab svg{width:22px;height:22px;}
.phone .tab.active{color:var(--primary);}
.tab-center{flex:1;display:flex;justify-content:center;position:relative;}
.tab-plus{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;top:-22px;cursor:pointer;}
.phone .tab-plus{background:linear-gradient(135deg,var(--primary-light),var(--primary-dark));box-shadow:0 6px 16px rgba(0,0,0,.25);}
.tab-plus-lbl{position:absolute;top:42px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;}
.phone .tab-plus-lbl{color:var(--primary);}

/* =========================================================================
   ITERATION VARIANTS
   ========================================================================= */

/* v1 — Mauve base (polished reference) — default styles */

/* v2 — Mauve frosted glass cards with subtle primary glow */
.v2 .card{background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid var(--primary-border);box-shadow:0 4px 20px rgba(124,58,237,.08);}
.v2 .sec-wrap{padding:0 16px;}

/* v3 — Mauve minimal — Outfit bold headings (no cursive), ultra-clean */
.v3 .sec-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#1a1a1a;}
.v3 .sec-title .sec-count{font-family:'Outfit';}
.v3 .card{box-shadow:none;border:1px solid #f1f1f1;}
.v3 .card.next{border:2px solid var(--primary);}

/* v4 — Hot pink base (polished reference in pink) */
/* uses data-c="pink" override + defaults */

/* v5 — Hot pink warm duo — pink primary + peach tint on cards */
.v5 .card{background:#fff7ed;border:1px solid #fed7aa;box-shadow:0 2px 10px rgba(251,146,60,.06);}
.v5 .card.next{background:linear-gradient(135deg,#fff7ed,#fef2f2);border:1px solid #fecaca;}
.v5 .ad{background:linear-gradient(135deg,#fce7f3,#fecaca);border:1px solid #f9a8d4;}
.v5 .ad-label{color:#be185d;}
.v5 .ad-sub{color:#9f1239;}

</style>
</head>
<body>

<div class="hdr">
  <h1>Pink Concepts v7 — Mauve &amp; Hot Pink</h1>
  <p>Fixes: Sarah avatar · clean header · left-aligned CTAs · 3 mauve + 2 hot pink iterations</p>
</div>

<div class="grid" id="grid"></div>

<svg width="0" height="0" style="position:absolute;">
<defs>

</svg>

<script>

  { cls:'v1', color:'mauve', name:'Mauve · Polished Base', tag:'Reference match with fixes applied · clean card shadows', swatch:'#7c3aed' },
