<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BamBuddies iOS — Interactive Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:#08080a;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
  overflow-x:hidden;
}

/* ── Header ── */
.page-header{text-align:center;margin-bottom:20px;}
.logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#2d5245,#5fcea0);display:inline-flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;margin-bottom:10px;}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.5px;}
.page-title span{color:#5fcea0;}
.page-sub{color:#555;font-size:13px;font-weight:400;margin-top:4px;}

/* ── Current screen label ── */
.screen-label{
  text-align:center;
  margin-bottom:14px;
  font-size:14px;
  font-weight:600;
  color:#888;
  letter-spacing:-.2px;
  min-height:20px;
  transition:opacity .2s;
}
.screen-label .name{color:#5fcea0;}

/* ── iPhone Frame ── */
.phone-wrap{position:relative;width:399px;height:858px;flex-shrink:0;}
.phone-frame{
  position:relative;
  width:393px;
  height:852px;
  border:3px solid #222;
  border-radius:52px;
  background:#000;
  overflow:hidden;
  margin:0 auto;
  box-shadow:0 0 0 1px #111, 0 20px 60px rgba(0,0,0,.6);
}
/* Notch */
.phone-frame::before{
  content:'';
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
  width:126px;
  height:36px;
  background:#000;
  border-radius:0 0 20px 20px;
  z-index:10;
}
/* Iframe */
.phone-frame iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:49px;
  background:#0a0a0c;
}

/* ── Transition overlay for fade ── */
.fade-overlay{
  position:absolute;
  inset:3px;
  border-radius:49px;
  background:#000;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s ease;
  z-index:5;
}
.fade-overlay.active{opacity:1;}

/* ── Nav controls below phone ── */
.nav-controls{
  display:flex;
  align-items:center;
  gap:12px;
  margin-top:16px;
  justify-content:center;
}
.nav-btn{
  background:#161616;
  border:1px solid #222;
  color:#888;
  font-family:'Outfit',sans-serif;
  font-size:13px;
  font-weight:600;
  padding:8px 18px;
  border-radius:10px;
  cursor:pointer;
  transition:all .15s;
  display:flex;
  align-items:center;
  gap:6px;
}
.nav-btn:hover:not(:disabled){background:#1e1e1e;color:#ccc;border-color:#333;}
.nav-btn:disabled{opacity:.3;cursor:default;}
.nav-counter{color:#444;font-size:12px;font-weight:500;min-width:60px;text-align:center;}

/* ── Floating menu button ── */
.menu-btn{
  position:fixed;
  bottom:32px;
  left:32px;
  width:48px;
  height:48px;
  border-radius:50%;
  background:#2d5245;
  border:none;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 4px 20px rgba(45,82,69,.4);
  transition:all .2s;
  z-index:1000;
}
.menu-btn:hover{background:#3a6858;transform:scale(1.05);}

/* ── Side panel ── */
.panel-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  z-index:1001;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
}
.panel-overlay.open{opacity:1;pointer-events:auto;}

.panel{
  position:fixed;
  top:0;
  left:0;
  width:300px;
  height:100%;
  background:#111;
  border-right:1px solid #1a1a1a;
  z-index:1002;
  transform:translateX(-100%);
  transition:transform .25s ease;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.panel.open{transform:translateX(0);}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 20px 16px;
  border-bottom:1px solid #1a1a1a;
  flex-shrink:0;
}
.panel-header h2{font-size:16px;font-weight:700;letter-spacing:-.3px;}
.panel-close{
  width:32px;height:32px;border-radius:8px;background:#1a1a1a;border:none;
  color:#666;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.panel-close:hover{background:#222;color:#aaa;}

.panel-body{flex:1;overflow-y:auto;padding:12px 0;}

.section-label{
  font-size:10px;font-weight:700;color:#444;text-transform:uppercase;
  letter-spacing:1.5px;padding:12px 20px 6px;
}

.screen-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 20px;cursor:pointer;
  transition:all .15s;border-left:3px solid transparent;
}
.screen-row:hover{background:#161616;}
.screen-row.active{border-left-color:#5fcea0;background:#0f1f18;}

.row-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.row-icon.default{background:#1a1a1a;color:#555;border:1px solid #222;}
.row-icon.active{background:linear-gradient(135deg,#0f2a20,#1a3327);color:#5fcea0;border:1px solid rgba(95,206,160,.15);}

.row-name{flex:1;font-size:14px;font-weight:500;color:#ccc;min-width:0;}
.screen-row.active .row-name{color:#fff;font-weight:600;}
.row-arrow{color:#333;font-size:16px;flex-shrink:0;}
.screen-row:hover .row-arrow{color:#555;}

/* ── Keyboard hint ── */
.kbd-hint{
  text-align:center;margin-top:12px;
  font-size:11px;color:#333;font-weight:400;
}
.kbd-hint kbd{
  display:inline-block;padding:2px 7px;border-radius:4px;
  background:#161616;border:1px solid #222;color:#555;font-family:'Outfit',sans-serif;
  font-size:10px;font-weight:600;margin:0 2px;
}

/* ── Scrollbar styling for panel ── */
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-track{background:transparent;}
.panel-body::-webkit-scrollbar-thumb{background:#222;border-radius:2px;}
</style>
</head>
<body>

<!-- Header -->
<div class="page-header">
  <div class="logo">B</div>
  <div class="page-title">Bam<span>Buddies</span> iOS</div>
  <div class="page-sub">Interactive Prototype — Tap the menu to navigate between screens</div>
</div>

<!-- Current screen label -->
<div class="screen-label" id="screenLabel">
  Loading <span class="name">Dashboard</span>...
</div>

<!-- iPhone Frame -->
<div class="phone-wrap">
  <div class="phone-frame">
    <div class="fade-overlay" id="fadeOverlay"></div>
    <iframe id="screenFrame" scrolling="yes" src="about:blank"></iframe>
  </div>
</div>

<!-- Nav controls -->
<div class="nav-controls">
  <button class="nav-btn" id="btnBack" disabled onclick="goBack()">← Back</button>
  <span class="nav-counter" id="navCounter">1 / 8</span>
  <button class="nav-btn" id="btnFwd" disabled onclick="goForward()">Forward →</button>
</div>

<div class="kbd-hint">
  <kbd>←</kbd> <kbd>→</kbd> prev / next &nbsp;&middot;&nbsp; <kbd>M</kbd> menu
</div>

<!-- Floating menu button -->
<button class="menu-btn" id="menuBtn" onclick="togglePanel()" title="Open screen picker (M)">☰</button>

<!-- Panel overlay -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

<!-- Side panel -->
<div class="panel" id="panel">
  <div class="panel-header">
    <h2>Screens</h2>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
// ── Screen definitions ──
const sections = [
  {
    label: 'Home',
    screens: [
      { id: 'dashboard', name: 'Dashboard', abbr: 'DB', file: 'dashboard-3ads.html' },
    ]
  },
  {
    label: 'Games',
    screens: [
      { id: 'my-games', name: 'My Games', abbr: 'MG', file: 'my-games.html' },
      { id: 'game-detail', name: 'Game Detail', abbr: 'GD', file: 'game-detail.html' },
      { id: 'game-creation', name: 'New Game (Wizard)', abbr: 'GC', file: 'game-creation.html' },
    ]
  },
  {
    label: 'Discover',
    screens: [
      { id: 'discover', name: 'Discover', abbr: 'DS', file: 'discover.html' },
    ]
  },
  {
    label: 'Groups',
    screens: [
      { id: 'groups', name: 'Groups', abbr: 'GR', file: 'groups.html' },
    ]
  },
  {
    label: 'Messaging',
    screens: [
      { id: 'messaging', name: 'Inbox, Chat & Activity', abbr: 'MS', file: 'messaging.html' },
    ]
  },
  {
    label: 'Account',
    screens: [
      { id: 'profile-auth', name: 'Profile & Settings', abbr: 'PA', file: 'profile-auth.html' },
    ]
  },
];

// Flat list for ordered navigation
const allScreens = sections.flatMap(s => s.screens);

// State
let currentIndex = 0;
let history = [];
let historyPos = -1;

// DOM refs
const frame = document.getElementById('screenFrame');
const fadeOverlay = document.getElementById('fadeOverlay');
const screenLabel = document.getElementById('screenLabel');
const btnBack = document.getElementById('btnBack');
const btnFwd = document.getElementById('btnFwd');
const navCounter = document.getElementById('navCounter');
const panel = document.getElementById('panel');
const panelOverlay = document.getElementById('panelOverlay');
const panelBody = document.getElementById('panelBody');

// ── Build panel ──
function buildPanel() {
  let html = '';
  sections.forEach(section => {
    html += `<div class="section-label">${section.label}</div>`;
    section.screens.forEach(screen => {
      const idx = allScreens.indexOf(screen);
      const isActive = idx === currentIndex;
      html += `
        <div class="screen-row${isActive ? ' active' : ''}" data-index="${idx}" onclick="navigateTo(${idx})">
          <div class="row-icon ${isActive ? 'active' : 'default'}">${screen.abbr}</div>
          <div class="row-name">${screen.name}</div>
          <div class="row-arrow">›</div>
        </div>`;
    });
  });
  panelBody.innerHTML = html;
}

// ── Navigate to screen by index ──
function navigateTo(index, skipHistory) {
  if (index < 0 || index >= allScreens.length) return;
  const screen = allScreens[index];
  currentIndex = index;

  // Update history
  if (!skipHistory) {
    // Trim forward history
    history = history.slice(0, historyPos + 1);
    history.push(index);
    historyPos = history.length - 1;
  }

  // Fade transition
  fadeOverlay.classList.add('active');
  setTimeout(() => {
    frame.src = screen.file;
    // Wait for load then fade in
    frame.onload = () => {
      setTimeout(() => fadeOverlay.classList.remove('active'), 50);
    };
    // Fallback unfade
    setTimeout(() => fadeOverlay.classList.remove('active'), 600);
  }, 150);

  // Update label
  screenLabel.innerHTML = `Viewing <span class="name">${screen.name}</span>`;

  // Update hash
  window.location.hash = screen.id;

  // Update counter
  navCounter.textContent = `${index + 1} / ${allScreens.length}`;

  // Update nav buttons
  btnBack.disabled = historyPos <= 0;
  btnFwd.disabled = historyPos >= history.length - 1;

  // Rebuild panel to update active state
  buildPanel();
  closePanel();
}

// ── History navigation ──
function goBack() {
  if (historyPos <= 0) return;
  historyPos--;
  navigateTo(history[historyPos], true);
}

function goForward() {
  if (historyPos >= history.length - 1) return;
  historyPos++;
  navigateTo(history[historyPos], true);
}

// ── Sequential prev/next ──
function goPrev() {
  if (currentIndex > 0) navigateTo(currentIndex - 1);
}

function goNext() {
  if (currentIndex < allScreens.length - 1) navigateTo(currentIndex + 1);
}

// ── Panel toggle ──
function togglePanel() {
  const isOpen = panel.classList.contains('open');
  if (isOpen) closePanel(); else openPanel();
}

function openPanel() {
  buildPanel();
  panel.classList.add('open');
  panelOverlay.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
  panelOverlay.classList.remove('open');
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
  else if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  else if (e.key === 'm' || e.key === 'M') { if (document.activeElement === document.body) togglePanel(); }
  else if (e.key === 'Escape') closePanel();
});

// ── Init from hash or default ──
function init() {
  const hash = window.location.hash.replace('#', '');
  let startIndex = 0;
  if (hash) {
    const found = allScreens.findIndex(s => s.id === hash);
    if (found >= 0) startIndex = found;
  }
  navigateTo(startIndex);
}

// Listen for hash changes (browser back/forward)
window.addEventListener('hashchange', () => {
  const hash = window.location.hash.replace('#', '');
  const found = allScreens.findIndex(s => s.id === hash);
  if (found >= 0 && found !== currentIndex) {
    navigateTo(found);
  }
});

init();
</script>
</body>
</html>
