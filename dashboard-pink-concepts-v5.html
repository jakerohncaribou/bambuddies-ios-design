<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pink Concepts v5 — Section Highlight Exploration</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:#1a1a1a;min-height:100vh;padding:30px 20px;color:#fff;}
.hdr{text-align:center;margin-bottom:30px;}
.hdr h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.hdr p{color:#999;font-size:13px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(393px,420px));gap:40px;justify-content:center;}
.wrap{display:flex;flex-direction:column;align-items:center;}
.label{font-size:12px;color:#bbb;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.tagline{font-size:11px;color:#888;margin-bottom:14px;max-width:360px;text-align:center;}

/* Phone frame */
.phone{width:393px;height:852px;border-radius:52px;border:3px solid #222;background:#000;position:relative;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:36px;background:#000;border-radius:0 0 20px 20px;z-index:100;}
.inner{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;}
.sbar{position:absolute;top:0;left:0;right:0;height:54px;padding:14px 28px 0;display:flex;justify-content:space-between;align-items:center;z-index:50;font-size:15px;font-weight:600;}
.scr{position:absolute;top:54px;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:100px;}
.scr::-webkit-scrollbar{display:none;}

/* Shared: greeting */
.grt-wrap{padding:6px 20px 14px;}
.grt-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.grt-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.grt-meta{flex:1;min-width:0;}
.grt-meta .t1{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.5px;}
.grt-icons{display:flex;gap:8px;}
.grt-bell{width:36px;height:36px;border-radius:50%;background:#f5f5f4;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;}
.grt-bell::after{content:'';position:absolute;top:9px;right:9px;width:7px;height:7px;border-radius:50%;background:#c73078;border:2px solid #fff;}

/* Sarah wrapped style (from iter 1 of v4) */
.grt-text{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;line-height:1.1;color:#1a1a1a;}
.grt-text .line1{display:block;margin-bottom:2px;}
.grt-name-box{display:inline-block;position:relative;padding:0 4px;}
.grt-name{font-family:'Caveat',cursive;font-size:46px;font-weight:700;color:#c73078;line-height:.9;}
.grt-swoosh{position:absolute;bottom:-4px;left:-2px;right:-4px;height:10px;pointer-events:none;}

/* Ad banner (shared) */
.ad{margin:0 16px 14px;background:linear-gradient(135deg,#fef3e7,#fee5ca);border-radius:18px;padding:12px 14px;display:flex;align-items:center;gap:12px;border:1px solid #fcd9a8;}
.ad-img{width:44px;height:44px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ad-txt{flex:1;min-width:0;}
.ad-label{font-size:9px;font-weight:700;color:#9a6f2a;letter-spacing:.8px;text-transform:uppercase;margin-bottom:1px;}
.ad-head{font-size:13px;font-weight:700;color:#1a1a1a;}
.ad-sub{font-size:11px;color:#6d4f16;margin-top:1px;}

/* Action row — smaller bubbles (4 buttons) */
.actions{padding:0 16px;margin-bottom:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.act{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.act-bubble{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:transform .15s;}
.act-bubble:active{transform:scale(.95);}
.act-lbl{font-size:10px;font-weight:600;color:#555;text-align:center;line-height:1.1;}

/* Tab bar with center + */
.tbar{position:absolute;bottom:0;left:0;right:0;height:83px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-top:1px solid #eee;display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;z-index:60;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.3px;padding-bottom:34px;cursor:pointer;}
.tab svg{width:22px;height:22px;}
.tab.active{color:#c73078;}
.tab-center{flex:1;display:flex;justify-content:center;position:relative;}
.tab-plus{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#e43984,#c73078);display:flex;align-items:center;justify-content:center;position:absolute;top:-22px;box-shadow:0 6px 16px rgba(199,48,120,.4);cursor:pointer;}
.tab-plus-lbl{position:absolute;top:42px;font-size:9px;font-weight:700;color:#c73078;letter-spacing:.3px;text-transform:uppercase;}

/* Section heading (shared) */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-title{font-size:15px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:8px;}
.sec-count{background:#fecaca;color:#b91c1c;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.sec-link{font-size:12px;font-weight:600;color:#c73078;}

/* Status pills (locked colors) */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.pill-committed{background:#dcfce7;color:#166534;}
.pill-pending{background:#fef3c7;color:#92400e;}
.pill-next{background:#fce7f3;color:#c73078;}

/* Upcoming game card content (shared markup) */
.game-time{font-family:'Outfit';font-size:16px;font-weight:800;color:#1a1a1a;letter-spacing:-.3px;line-height:1.1;}
.game-name{font-size:13px;font-weight:600;color:#555;margin-top:2px;}
.game-loc{font-size:11px;color:#999;margin-top:3px;display:flex;align-items:center;gap:4px;}
.game-loc svg{width:10px;height:10px;}
.game-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.game-players{font-size:11px;font-weight:700;color:#1a1a1a;}
.date-blk{width:48px;height:48px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.date-blk .mon{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.date-blk .day{font-size:18px;font-weight:900;line-height:.9;margin-top:2px;}

/* Attention card content (shared) */
.att-row{display:flex;gap:10px;align-items:center;}
.att-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.att-txt{flex:1;min-width:0;}
.att-name{font-size:13px;font-weight:700;color:#1a1a1a;}
.att-meta{font-size:11px;color:#999;margin-top:1px;}
.att-cta{display:flex;gap:10px;align-items:center;flex-shrink:0;}
.att-accept{background:#c73078;color:#fff;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;}
.att-decline{font-size:11px;color:#999;font-weight:600;cursor:pointer;text-decoration:underline;}

/* ============================================================
   ITER 01 — SOFT SHADOW FLOAT (no borders, subtle shadows)
   ============================================================ */
.i01 .inner{background:#faf8f5;}
.i01 .sec-wrap{padding:0 16px;margin-bottom:18px;}
.i01 .card{background:#fff;border-radius:20px;padding:14px;box-shadow:0 4px 20px rgba(199,48,120,.06),0 1px 2px rgba(0,0,0,.04);margin-bottom:10px;}
.i01 .card.next{background:linear-gradient(135deg,#fff5f9,#fff);}
.i01 .card.att{background:#fff;}
.i01 .game-row{display:flex;gap:12px;align-items:center;}
.i01 .date-blk{background:#fce7f3;color:#c73078;}

/* ============================================================
   ITER 02 — LEFT ACCENT STRIPE (thin vertical pink stripe)
   ============================================================ */
.i02 .inner{background:#fff;}
.i02 .sec-wrap{padding:0 16px;margin-bottom:18px;}
.i02 .sec-title{padding-left:14px;border-left:4px solid #c73078;border-radius:2px;line-height:1;}
.i02 .card{background:#fff;border-radius:0 14px 14px 0;padding:14px 14px 14px 18px;border-left:4px solid #fbcfe8;margin-bottom:10px;position:relative;}
.i02 .card.next{border-left-color:#c73078;background:#fdf4f9;}
.i02 .card.att{border-left-color:#f59e0b;}
.i02 .card.game{border-left-color:#10b981;}
.i02 .game-row{display:flex;gap:12px;align-items:center;}
.i02 .date-blk{background:#f5f5f4;color:#1a1a1a;}

/* ============================================================
   ITER 03 — TINTED BACKGROUND PANELS (pastel section fills)
   ============================================================ */
.i03 .inner{background:#fff;}
.i03 .sec-wrap{margin:0 0 14px;padding:14px 16px;}
.i03 .sec-wrap.next{background:linear-gradient(180deg,#fce7f3,#fdf2f8);border-radius:0;}
.i03 .sec-wrap.att{background:linear-gradient(180deg,#fef3c7,#fef9ed);}
.i03 .sec-wrap.games{background:linear-gradient(180deg,#ecfdf5,#f0fdf4);}
.i03 .card{background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-radius:14px;padding:12px;margin-bottom:8px;}
.i03 .game-row{display:flex;gap:12px;align-items:center;}
.i03 .date-blk{background:rgba(255,255,255,.85);color:#1a1a1a;}

/* ============================================================
   ITER 04 — DIVIDERS ONLY (no card frames, just separators)
   ============================================================ */
.i04 .inner{background:#fff;}
.i04 .sec-wrap{padding:0 20px;margin-bottom:20px;}
.i04 .sec-hdr{padding-bottom:8px;border-bottom:2px solid #1a1a1a;margin-bottom:14px;}
.i04 .sec-title{font-family:'Ma Shan Zheng',cursive;font-weight:400;font-size:22px;letter-spacing:1px;}
.i04 .card{background:transparent;padding:12px 0;border-bottom:1px dashed #e5e5e5;margin-bottom:0;}
.i04 .card:last-child{border-bottom:none;}
.i04 .game-row{display:flex;gap:12px;align-items:center;}
.i04 .date-blk{background:#fafafa;color:#1a1a1a;border:1px solid #e5e5e5;}
.i04 .card.next{padding:16px 0;}
.i04 .card.next .game-time{color:#c73078;font-size:20px;}

/* ============================================================
   ITER 05 — PAPER STACK OFFSET (tactile paper notes)
   ============================================================ */
.i05 .inner{background:#f5f1ea;background-image:radial-gradient(circle at 20% 20%,#fff 1px,transparent 1px),radial-gradient(circle at 60% 70%,#fff 1px,transparent 1px);background-size:40px 40px;}
.i05 .sec-wrap{padding:0 18px;margin-bottom:20px;}
.i05 .sec-title{font-family:'Caveat',cursive;font-size:24px;font-weight:700;}
.i05 .card{background:#fff;border-radius:4px;padding:14px;margin-bottom:14px;box-shadow:2px 3px 0 rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.03);position:relative;transform:rotate(-.3deg);}
.i05 .card:nth-child(even){transform:rotate(.4deg);}
.i05 .card::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:32px;height:10px;background:#fef3c7;border:1px solid #fde68a;border-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
.i05 .card.next{background:#fff0f7;}
.i05 .card.att{background:#fffbeb;}
.i05 .card.game{background:#fff;}
.i05 .game-row{display:flex;gap:12px;align-items:center;}
.i05 .date-blk{background:#fef3c7;color:#92400e;border:1px solid #fde68a;}
</style>
</head>
<body>

<div class="hdr">
  <h1>Pink Concepts v5 — Section Highlights</h1>
  <p>Sarah locked · "Learn" removed · + in tab bar · Your Games restored · 5 highlight treatments</p>
</div>

<div class="grid" id="grid"></div>

<!-- SVG sprite for action bubble icons -->
<svg width="0" height="0" style="position:absolute;">
<defs>
<!-- Start Game - mahjong tile buddy -->
<symbol id="ic-game" viewBox="0 0 48 48">
  <rect x="10" y="8" width="28" height="34" rx="6" fill="#fff" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="18" cy="20" r="1.8" fill="#1a1a1a"/>
  <circle cx="30" cy="20" r="1.8" fill="#1a1a1a"/>
  <path d="M17 28 Q24 32 31 28" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="24" cy="13" r="2.4" fill="#c73078"/>
</symbol>
<!-- Start Group - three heads -->
<symbol id="ic-group" viewBox="0 0 48 48">
  <circle cx="16" cy="22" r="8" fill="#fed7aa" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="32" cy="22" r="8" fill="#bae6fd" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="24" cy="30" r="9" fill="#fbcfe8" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="21" cy="29" r="1.3" fill="#1a1a1a"/>
  <circle cx="27" cy="29" r="1.3" fill="#1a1a1a"/>
  <path d="M21 33 Q24 35 27 33" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</symbol>
<!-- Find Games - map with pin -->
<symbol id="ic-find" viewBox="0 0 48 48">
  <path d="M8 12 L18 8 L30 12 L40 8 L40 36 L30 40 L18 36 L8 40 Z" fill="#d1fae5" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
  <path d="M18 8 L18 36 M30 12 L30 40" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-dasharray="2 2"/>
  <path d="M24 18 C21 18 19 20 19 23 C19 27 24 32 24 32 C24 32 29 27 29 23 C29 20 27 18 24 18 Z" fill="#c73078" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="24" cy="23" r="1.8" fill="#fff"/>
</symbol>
<!-- Messages - speech bubble with peeker -->
<symbol id="ic-msg" viewBox="0 0 48 48">
  <path d="M8 14 C8 10 11 8 15 8 L33 8 C37 8 40 10 40 14 L40 28 C40 32 37 34 33 34 L22 34 L14 40 L16 34 L15 34 C11 34 8 32 8 28 Z" fill="#fff" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="16" cy="21" r="1.8" fill="#c73078"/>
  <circle cx="24" cy="21" r="1.8" fill="#c73078"/>
  <circle cx="32" cy="21" r="1.8" fill="#c73078"/>
</symbol>
<!-- Location pin small -->
<symbol id="ic-pin" viewBox="0 0 24 24">
  <path d="M12 2 C8 2 5 5 5 9 C5 14 12 22 12 22 C12 22 19 14 19 9 C19 5 16 2 12 2 Z" fill="none" stroke="#999" stroke-width="2"/>
  <circle cx="12" cy="9" r="2" fill="none" stroke="#999" stroke-width="2"/>
</symbol>
</defs>
</svg>

<script>
// ============== SHARED DATA ==============
const greetings = [
  { text: "May the winds favor you,", sub: "East · South · West · North" },
  { text: "Three bams and a dream,", sub: "East wind · fresh start" },
  { text: "Red dragon energy today,", sub: "Bold tiles · bolder moves" },
  { text: "Tiles don't lie,", sub: "Let's turn them into triumphs" },
  { text: "East wind rises for you,", sub: "Time to play your hand" }
];

const iterations = [
  { id: 'i01', name: 'Soft Shadow Float', tag: 'No borders · airy shadows on warm cream', greetIdx: 0 },
  { id: 'i02', name: 'Left Accent Stripe', tag: 'Status-colored left stripe anchors each card', greetIdx: 1 },
  { id: 'i03', name: 'Tinted Panels', tag: 'Pastel section fills · color = delineation', greetIdx: 2 },
  { id: 'i04', name: 'Dividers Only', tag: 'Zero chrome · Ma Shan Zheng section titles', greetIdx: 3 },
  { id: 'i05', name: 'Paper Stack Offset', tag: 'Tactile notes pinned on a board', greetIdx: 4 }
];

const avatarUrl = 'https://images.unsplash.com/photo-1494790108755-2616b5b9ebd5?w=100&h=100&fit=crop&crop=face';
const miaAvatar = 'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100&h=100&fit=crop&crop=face';
const lisaAvatar = 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=100&h=100&fit=crop&crop=face';

// ============== TEMPLATE ==============
function phoneHTML(iter){
  const g = greetings[iter.greetIdx];
  return `
<div class="wrap">
  <div class="label">Iteration ${iter.id.slice(-2)}</div>
  <div class="tagline"><b>${iter.name}</b> — ${iter.tag}</div>
  <div class="phone ${iter.id}">
    <div class="notch"></div>
    <div class="inner">
      <div class="sbar"><span>9:41</span><span>&#9679;&#9679;&#9679;&#9679;&nbsp;&#128267;</span></div>
      <div class="scr">

        <!-- Greeting -->
        <div class="grt-wrap">
          <div class="grt-row">
            <img class="grt-avatar" src="${avatarUrl}" alt="">
            <div class="grt-meta"><div class="t1">${g.sub}</div></div>
            <div class="grt-icons">
              <div class="grt-bell">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
              </div>
            </div>
          </div>
          <div class="grt-text">
            <span class="line1">${g.text}</span>
            <span class="grt-name-box">
              <span class="grt-name">Sarah</span>
              <svg class="grt-swoosh" viewBox="0 0 120 10" preserveAspectRatio="none"><path d="M2 6 Q30 2 60 5 T118 4" stroke="#c73078" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
            </span>
          </div>
        </div>

        <!-- Ad banner -->
        <div class="ad">
          <div class="ad-img">&#127846;</div>
          <div class="ad-txt">
            <div class="ad-label">Sponsored</div>
            <div class="ad-head">New Mahjong Sets — 20% Off</div>
            <div class="ad-sub">Free shipping this week only</div>
          </div>
        </div>

        <!-- Action row (4 buttons, no Learn) -->
        <div class="actions">
          <div class="act"><div class="act-bubble"><svg width="30" height="30"><use href="#ic-game"/></svg></div><div class="act-lbl">Start<br>Game</div></div>
          <div class="act"><div class="act-bubble"><svg width="30" height="30"><use href="#ic-group"/></svg></div><div class="act-lbl">Start<br>Group</div></div>
          <div class="act"><div class="act-bubble"><svg width="30" height="30"><use href="#ic-find"/></svg></div><div class="act-lbl">Find<br>Games</div></div>
          <div class="act"><div class="act-bubble"><svg width="30" height="30"><use href="#ic-msg"/></svg></div><div class="act-lbl">Messages</div></div>
        </div>

        <!-- NEXT GAME -->
        <div class="sec-wrap next">
          <div class="sec-hdr"><div class="sec-title">Your Next Game</div><span class="pill pill-next">IN 2 DAYS</span></div>
          <div class="card next">
            <div class="game-row">
              <div class="date-blk"><span class="mon">SAT</span><span class="day">19</span></div>
              <div class="att-txt">
                <div class="game-time">2:00 PM · 2 hrs</div>
                <div class="game-name">Saturday Mahjong</div>
                <div class="game-loc"><svg><use href="#ic-pin"/></svg>123 Main St, Brooklyn</div>
              </div>
              <div class="game-right"><span class="pill pill-committed">COMMITTED</span><div class="game-players">4 of 4 players</div></div>
            </div>
          </div>
        </div>

        <!-- NEEDS ATTENTION -->
        <div class="sec-wrap att">
          <div class="sec-hdr"><div class="sec-title">Needs Your Attention <span class="sec-count">2</span></div><div class="sec-link">See all</div></div>
          <div class="card att">
            <div class="att-row">
              <img class="att-avatar" src="${miaAvatar}" alt="">
              <div class="att-txt">
                <div class="att-name">Mia invited you — Tuesday Game</div>
                <div class="att-meta">Tue Apr 22 · 6:30 PM · 3 of 4 players</div>
              </div>
              <div class="att-cta">
                <div class="att-accept">Accept</div>
                <div class="att-decline">Decline</div>
              </div>
            </div>
          </div>
          <div class="card att">
            <div class="att-row">
              <img class="att-avatar" src="${lisaAvatar}" alt="">
              <div class="att-txt">
                <div class="att-name">Lisa's Open Game is full — confirm?</div>
                <div class="att-meta">Thu Apr 24 · 3:00 PM · 4 of 4 players</div>
              </div>
              <div class="att-cta">
                <div class="att-accept">Confirm</div>
                <div class="att-decline">Skip</div>
              </div>
            </div>
          </div>
        </div>

        <!-- YOUR GAMES -->
        <div class="sec-wrap games">
          <div class="sec-hdr"><div class="sec-title">Your Games</div><div class="sec-link">See all</div></div>
          <div class="card game">
            <div class="game-row">
              <div class="date-blk"><span class="mon">MON</span><span class="day">21</span></div>
              <div class="att-txt">
                <div class="game-time">7:00 PM · 2 hrs</div>
                <div class="game-name">Lisa's Practice Game</div>
                <div class="game-loc"><svg><use href="#ic-pin"/></svg>Lisa's Apartment</div>
              </div>
              <div class="game-right"><span class="pill pill-pending">PENDING</span><div class="game-players">3 of 4</div></div>
            </div>
          </div>
          <div class="card game">
            <div class="game-row">
              <div class="date-blk"><span class="mon">FRI</span><span class="day">26</span></div>
              <div class="att-txt">
                <div class="game-time">1:00 PM · 3 hrs</div>
                <div class="game-name">Weekend Warriors</div>
                <div class="game-loc"><svg><use href="#ic-pin"/></svg>Sarah's Place</div>
              </div>
              <div class="game-right"><span class="pill pill-pending">PENDING</span><div class="game-players">2 of 4</div></div>
            </div>
          </div>
